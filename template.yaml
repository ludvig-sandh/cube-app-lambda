AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  cube-app-lambda

  SAM template for the Cube App Lambda function, triggered via API Gateway.

# More info about Globals: https://github.com/awslabs/serverless-application-model/blob/master/docs/globals.rst
Globals:
  Function:
    Timeout: 3

Resources:
  ApiFunction:
    Type: AWS::Serverless::Function # More info about Function Resource: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#awsserverlessfunction
    Properties:
      CodeUri: api/
      Handler: app.lambdaHandler
      Runtime: nodejs22.x
      Architectures:
        - arm64
      # Hard cap on simultaneous invocations, so cost is bounded regardless
      # of how much traffic (legitimate or abusive) hits the API.
      ReservedConcurrentExecutions: 20
      Environment:
        Variables:
          ALGORITHM_SETS_TABLE_NAME: !Ref AlgorithmSetsTable
          CASES_TABLE_NAME: !Ref CasesTable
          ALGORITHMS_TABLE_NAME: !Ref AlgorithmsTable
          VOTES_TABLE_NAME: !Ref VotesTable
      # One CRUD policy per table, scoped to just that table's ARN (plus its
      # indexes) - narrower than a blanket DynamoDB:* IAM statement.
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AlgorithmSetsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref CasesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AlgorithmsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref VotesTable
      Events:
        ApiRequest:
          Type: Api # More info about API Event Source: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#api
          Properties:
            Path: /hello
            Method: get
        CheckIdentityRequest:
          Type: Api
          Properties:
            Path: /check-identity
            Method: post
    Metadata: # Manage esbuild properties
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2020"
        Sourcemap: true
        EntryPoints:
        - app.ts

  # Internal-only, one row per algorithm set (e.g. "OLL"): cubeType, plus
  # mask - the string NormalCube.applyIgnoreMask() takes, marking which
  # cells this set doesn't care about (e.g. OLL marks the last layer's side
  # stickers as don't-care, since OLL only orients - it doesn't permute).
  # Nothing is precomputed from this at seed time - the submission Lambda
  # applies it fresh on every request (new NormalCube -> applyIgnoreMask ->
  # applyMoves(the case's scramble)) to build that request's starting cube.
  # Shared by every case in the set, so it lives here once rather than
  # being repeated per case.
  AlgorithmSetsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AlgorithmSets
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: setId
          AttributeType: S
      KeySchema:
        - AttributeName: setId
          KeyType: HASH

  # Internal-only: (setId, caseId) -> scramble (plain move notation, e.g.
  # "R U2 R' U' R U' R'"), used by the submission Lambda to build that
  # case's starting cube on every request (see AlgorithmSetsTable above).
  # Just the raw scramble is stored - no precomputed/derived cube state -
  # so there's nothing to keep in sync if the mask or scramble ever change.
  # Never exposed via a public endpoint.
  CasesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Cases
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: setId
          AttributeType: S
        - AttributeName: caseId
          AttributeType: N
      KeySchema:
        - AttributeName: setId
          KeyType: HASH
        - AttributeName: caseId
          KeyType: RANGE

  # PK setId#caseId (stored as attribute "setIdCaseId") groups every
  # algorithm submitted for a case; SK algorithmId identifies one of them.
  # The ByCaseVotes GSI reorders the same items by vote count so
  # "top algorithm for a case" is a single cheap Query(Limit=1,
  # ScanIndexForward=false) instead of a scan.
  AlgorithmsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Algorithms
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: setIdCaseId
          AttributeType: S
        - AttributeName: algorithmId
          AttributeType: S
        - AttributeName: votes
          AttributeType: N
      KeySchema:
        - AttributeName: setIdCaseId
          KeyType: HASH
        - AttributeName: algorithmId
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: ByCaseVotes
          KeySchema:
            - AttributeName: setIdCaseId
              KeyType: HASH
            - AttributeName: votes
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # PK installationId, SK setId#caseId (attribute "setIdCaseId") - one row
  # per (install, case), so a device's vote on a case is a single overwrite
  # rather than a growing list.
  VotesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Votes
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: installationId
          AttributeType: S
        - AttributeName: setIdCaseId
          AttributeType: S
      KeySchema:
        - AttributeName: installationId
          KeyType: HASH
        - AttributeName: setIdCaseId
          KeyType: RANGE

Outputs:
  # ServerlessRestApi is an implicit API created out of Events key under Serverless::Function
  # Find out more about other implicit resources you can reference within SAM
  # https://github.com/awslabs/serverless-application-model/blob/master/docs/internals/generated_resources.rst#api
  ApiUrl:
    Description: "API Gateway endpoint URL for Prod stage"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/Prod/hello/"
  ApiFunction:
    Description: "Lambda Function ARN"
    Value: !GetAtt ApiFunction.Arn
  ApiFunctionIamRole:
    Description: "Implicit IAM Role created for the function"
    Value: !GetAtt ApiFunctionRole.Arn
