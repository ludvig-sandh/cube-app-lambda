AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  cube-app-lambda

  SAM template for the Cube App Lambda function, triggered via API Gateway.

# More info about Globals: https://github.com/awslabs/serverless-application-model/blob/master/docs/globals.rst
Globals:
  Function:
    Timeout: 3
  Api:
    # Overall (not per-caller) throttle on the whole API, applied at the
    # API Gateway stage - independent of and in addition to
    # ReservedConcurrentExecutions on the function itself. Steady-state 20
    # req/s matches that concurrency cap; burst allows short spikes above
    # it before requests start getting 429'd.
    MethodSettings:
      - ResourcePath: '/*'
        HttpMethod: '*'
        ThrottlingRateLimit: 20
        ThrottlingBurstLimit: 40

Parameters:
  # Table names are Parameters (not just literal strings inline on each
  # table resource) so the Lambda's env vars can !Ref them directly. A
  # !Ref to a resource's own attributes (e.g. !Ref AlgorithmSetsTable)
  # doesn't resolve locally without a real deployed stack - SAM CLI falls
  # back to the logical ID as a placeholder - but !Ref on a Parameter
  # always resolves to its actual value, deployed or local.
  AlgorithmSetsTableName:
    Type: String
    Default: AlgorithmSets
  CasesTableName:
    Type: String
    Default: Cases
  AlgorithmsTableName:
    Type: String
    Default: Algorithms
  VotesTableName:
    Type: String
    Default: Votes
  # Only set for local development, via `sam local start-api
  # --parameter-overrides DynamoDBEndpointOverride=http://<host>:8000` -
  # left blank for real deployments, so the SDK talks to real AWS DynamoDB.
  DynamoDBEndpointOverride:
    Type: String
    Default: ''

Resources:
  ApiFunction:
    Type: AWS::Serverless::Function # More info about Function Resource: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#awsserverlessfunction
    Properties:
      CodeUri: api/
      Handler: app.lambdaHandler
      Runtime: nodejs22.x
      Architectures:
        - arm64
      # Hard cap on simultaneous invocations, so cost is bounded regardless
      # of how much traffic (legitimate or abusive) hits the API.
      ReservedConcurrentExecutions: 20
      Environment:
        Variables:
          ALGORITHM_SETS_TABLE_NAME: !Ref AlgorithmSetsTableName
          CASES_TABLE_NAME: !Ref CasesTableName
          ALGORITHMS_TABLE_NAME: !Ref AlgorithmsTableName
          VOTES_TABLE_NAME: !Ref VotesTableName
          DYNAMODB_ENDPOINT: !Ref DynamoDBEndpointOverride
      # One CRUD policy per table, scoped to just that table's ARN (plus its
      # indexes) - narrower than a blanket DynamoDB:* IAM statement.
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AlgorithmSetsTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref CasesTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref AlgorithmsTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref VotesTableName
      Events:
        TopAlgorithmsRequest:
          Type: Api # More info about API Event Source: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#api
          Properties:
            Path: /algorithm-sets/{setId}/top-algorithms
            Method: get
        ListAlgorithmsRequest:
          Type: Api
          Properties:
            Path: /algorithm-sets/{setId}/cases/{caseId}/algorithms
            Method: get
        SubmitAlgorithmRequest:
          Type: Api
          Properties:
            Path: /algorithm-sets/{setId}/cases/{caseId}/algorithms
            Method: post
        CastVoteRequest:
          Type: Api
          Properties:
            Path: /algorithm-sets/{setId}/cases/{caseId}/vote
            Method: put
    Metadata: # Manage esbuild properties
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2020"
        Sourcemap: true
        EntryPoints:
        - app.ts

  # Internal-only, one row per algorithm set (e.g. "OLL"): cubeType, plus
  # mask - the string NormalCube.applyIgnoreMask() takes, marking which
  # cells this set doesn't care about (e.g. OLL marks the last layer's side
  # stickers as don't-care, since OLL only orients - it doesn't permute).
  # Nothing is precomputed from this at seed time - the submission Lambda
  # applies it fresh on every request (new NormalCube -> applyIgnoreMask ->
  # applyMoves(the case's scramble)) to build that request's starting cube.
  # Shared by every case in the set, so it lives here once rather than
  # being repeated per case.
  AlgorithmSetsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref AlgorithmSetsTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: setId
          AttributeType: S
      KeySchema:
        - AttributeName: setId
          KeyType: HASH

  # Internal-only: (setId, caseId) -> scramble (plain move notation, e.g.
  # "R U2 R' U' R U' R'"), used by the submission Lambda to build that
  # case's starting cube on every request (see AlgorithmSetsTable above).
  # Just the raw scramble is stored - no precomputed/derived cube state -
  # so there's nothing to keep in sync if the mask or scramble ever change.
  # Never exposed via a public endpoint.
  CasesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref CasesTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: setId
          AttributeType: S
        - AttributeName: caseId
          AttributeType: N
      KeySchema:
        - AttributeName: setId
          KeyType: HASH
        - AttributeName: caseId
          KeyType: RANGE

  # PK setId#caseId (stored as attribute "setIdCaseId") groups every
  # algorithm submitted for a case; SK algorithmId identifies one of them.
  # The ByCaseVotes GSI reorders the same items by vote count so
  # "top algorithm for a case" is a single cheap Query(Limit=1,
  # ScanIndexForward=false) instead of a scan.
  AlgorithmsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref AlgorithmsTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: setIdCaseId
          AttributeType: S
        - AttributeName: algorithmId
          AttributeType: S
        - AttributeName: votes
          AttributeType: N
      KeySchema:
        - AttributeName: setIdCaseId
          KeyType: HASH
        - AttributeName: algorithmId
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: ByCaseVotes
          KeySchema:
            - AttributeName: setIdCaseId
              KeyType: HASH
            - AttributeName: votes
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # PK installationId, SK setId#caseId (attribute "setIdCaseId") - one row
  # per (install, case), so a device's vote on a case is a single overwrite
  # rather than a growing list.
  VotesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref VotesTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: installationId
          AttributeType: S
        - AttributeName: setIdCaseId
          AttributeType: S
      KeySchema:
        - AttributeName: installationId
          KeyType: HASH
        - AttributeName: setIdCaseId
          KeyType: RANGE

Outputs:
  # ServerlessRestApi is an implicit API created out of Events key under Serverless::Function
  # Find out more about other implicit resources you can reference within SAM
  # https://github.com/awslabs/serverless-application-model/blob/master/docs/internals/generated_resources.rst#api
  ApiUrl:
    Description: "API Gateway endpoint URL for Prod stage"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/Prod/"
  ApiFunction:
    Description: "Lambda Function ARN"
    Value: !GetAtt ApiFunction.Arn
  ApiFunctionIamRole:
    Description: "Implicit IAM Role created for the function"
    Value: !GetAtt ApiFunctionRole.Arn
